<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Come Alive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2333;
    --ink-2:#262E45;
    --paper:#FBF3E4;
    --paper-line:#e8dcc4;
    --coral:#FF6B57;
    --teal:#2BC4B8;
    --gold:#FFC64B;
    --violet:#9B7EDE;
    --text-soft:#c7cce0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--ink);
    font-family:'Nunito',sans-serif;
    color:#fff;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    padding:14px 18px 10px;
    display:flex; align-items:center; justify-content:space-between;
    z-index:5;
  }
  .brand{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:20px;
    letter-spacing:0.3px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--coral);
    box-shadow:0 0 0 4px rgba(255,107,87,0.18);
  }
  .ghost-btn{
    background:transparent;
    border:1.5px solid rgba(255,255,255,0.25);
    color:#fff;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .ghost-btn:active{ background:rgba(255,255,255,0.1); }

  /* ---------- Screens ---------- */
  .screen{
    flex:1 1 auto;
    position:relative;
    display:none;
    min-height:0;
  }
  .screen.active{ display:flex; flex-direction:column; }

  /* ---------- Draw screen ---------- */
  #drawScreen{ padding:0 14px 14px; align-items:center; }
  #canvasWrap{
    position:relative;
    flex:1 1 auto;
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
  }
  #drawCanvas{
    width:100%;
    height:100%;
    max-width:520px;
    max-height:100%;
    aspect-ratio:1/1;
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size:100% 34px;
    border-radius:22px;
    box-shadow:0 14px 34px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04);
    touch-action:none;
    cursor:crosshair;
  }
  #promptTag{
    position:absolute;
    top:10px; left:50%; transform:translateX(-50%);
    background:var(--ink);
    color:var(--text-soft);
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:999px;
    white-space:nowrap;
    opacity:0.9;
    pointer-events:none;
  }

  .toolbar{
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 2px 4px;
    flex:0 0 auto;
  }
  .swatches{ display:flex; gap:8px; }
  .swatch{
    width:30px; height:30px; border-radius:50%;
    border:3px solid transparent;
    cursor:pointer;
    padding:0;
  }
  .swatch.active{ border-color:#fff; transform:scale(1.12); }
  .tool-btn{
    background:var(--ink-2);
    border:none; color:#fff;
    width:38px; height:38px; border-radius:50%;
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .tool-group{ display:flex; gap:8px; align-items:center; }
  .brush-slider{
    flex:1 1 auto;
    min-width:50px;
    max-width:120px;
    accent-color:var(--coral);
  }

  #liveBtnWrap{ width:100%; max-width:520px; padding:6px 2px 4px; flex:0 0 auto; }
  #liveBtn{
    width:100%;
    border:none;
    border-radius:16px;
    padding:15px 0;
    background:linear-gradient(135deg, var(--coral), #ff8a3d);
    color:#1C2333;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:17px;
    letter-spacing:0.2px;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(255,107,87,0.35);
    transition:transform .1s;
  }
  #liveBtn:active{ transform:scale(0.98); }
  #liveBtn:disabled{ opacity:0.5; }

  /* ---------- Live screen ---------- */
  #liveScreen{ }
  #stage{
    position:relative;
    flex:1 1 auto;
    overflow:hidden;
    background:#000;
  }
  #camVideo{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    transform:scaleX(-1);
  }
  #camVideo.rear{ transform:none; }
  #liveCanvas{
    position:absolute; inset:0;
    width:100%; height:100%;
  }
  #camMsg{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    padding:30px;
    font-size:14px;
    color:var(--text-soft);
    background:var(--ink);
  }
  #liveFooter{
    flex:0 0 auto;
    display:flex; gap:10px;
    padding:12px 14px 16px;
    z-index:5;
  }
  #liveFooter .ghost-btn{ flex:1; text-align:center; padding:12px 0; }
  #addBtn{ background:var(--teal); border-color:var(--teal); color:#08312d; }
  #clearBtn{ }

  #hint{
    position:absolute; left:0; right:0; top:12px;
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,0.85);
    font-weight:700;
    pointer-events:none;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }

  #moveControls{
    position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
    display:grid;
    grid-template-columns:46px 46px 46px;
    grid-template-rows:46px 46px 46px;
    gap:6px;
    z-index:4;
  }
  #moveUpBtn{ grid-column:2; grid-row:1; }
  #moveLeftBtn{ grid-column:1; grid-row:2; }
  #moveRightBtn{ grid-column:3; grid-row:2; }
  #moveDownBtn{ grid-column:2; grid-row:3; }
  .move-btn{
    width:100%; height:100%; border-radius:50%;
    background:rgba(255,255,255,0.14);
    border:1.5px solid rgba(255,255,255,0.35);
    color:#fff;
    font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    touch-action:none;
    user-select:none;
  }
  .move-btn:active{ background:rgba(255,255,255,0.32); }

  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand"><span class="dot"></span>Come Alive</div>
    <button class="ghost-btn" id="helpBtn">?</button>
  </header>

  <!-- DRAW SCREEN -->
  <div class="screen active" id="drawScreen">
    <div id="canvasWrap">
      <div id="promptTag">draw something small &amp; simple</div>
      <canvas id="drawCanvas" width="600" height="600"></canvas>
    </div>

    <div class="toolbar">
      <div class="swatches" id="swatches"></div>
      <input type="range" id="brushSizeInput" class="brush-slider" min="3" max="30" value="10" title="Brush size">
      <div class="tool-group">
        <button class="tool-btn" id="undoBtn" title="Undo">↺</button>
        <button class="tool-btn" id="clearDrawBtn" title="Clear">✕</button>
      </div>
    </div>

    <div id="liveBtnWrap">
      <button id="liveBtn" disabled>Bring it to life ✨</button>
    </div>
  </div>

  <!-- LIVE SCREEN -->
  <div class="screen" id="liveScreen">
    <div id="stage">
      <video id="camVideo" class="rear" autoplay playsinline muted></video>
      <canvas id="liveCanvas"></canvas>
      <div id="hint">tap a creature to select &amp; boop it</div>
      <div id="moveControls">
        <button class="move-btn" id="moveUpBtn" title="Move up">▲</button>
        <button class="move-btn" id="moveLeftBtn" title="Move left">◀</button>
        <button class="move-btn" id="moveRightBtn" title="Move right">▶</button>
        <button class="move-btn" id="moveDownBtn" title="Move down">▼</button>
      </div>
      <div id="camMsg" class="hidden"></div>
    </div>
    <div id="liveFooter">
      <button class="tool-btn" id="flipCamBtn" title="Flip camera">⟲</button>
      <button class="ghost-btn" id="addBtn">＋ Draw another</button>
      <button class="ghost-btn" id="clearBtn">Clear all</button>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ================= DRAWING ================= */
  const drawCanvas = document.getElementById('drawCanvas');
  const dctx = drawCanvas.getContext('2d', {willReadFrequently:true});
  const RES = 600;
  drawCanvas.width = RES; drawCanvas.height = RES;

  const colors = ['#1C2333','#FF6B57','#2BC4B8','#FFC64B','#9B7EDE','#FFFFFF'];
  let currentColor = colors[0];
  let brushSize = 10;
  const swatchesEl = document.getElementById('swatches');
  colors.forEach((c,i)=>{
    const b = document.createElement('button');
    b.className = 'swatch' + (i===0?' active':'');
    b.style.background = c;
    if(c === '#FFFFFF') b.style.boxShadow = 'inset 0 0 0 1px rgba(0,0,0,0.2)';
    b.addEventListener('click', ()=>{
      currentColor = c;
      [...swatchesEl.children].forEach(ch=>ch.classList.remove('active'));
      b.classList.add('active');
    });
    swatchesEl.appendChild(b);
  });

  const brushSizeInput = document.getElementById('brushSizeInput');
  brushSizeInput.addEventListener('input', ()=>{ brushSize = Number(brushSizeInput.value); });

  let drawing = false;
  let lastPt = null;
  let strokes = []; // for undo: array of {img data snapshots} -- store as canvas snapshots
  let hasDrawn = false;
  const liveBtn = document.getElementById('liveBtn');

  function getPos(e){
    const rect = drawCanvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
    return {
      x: (cx - rect.left) / rect.width * RES,
      y: (cy - rect.top) / rect.height * RES
    };
  }

  function snapshot(){
    strokes.push(dctx.getImageData(0,0,RES,RES));
    if(strokes.length > 20) strokes.shift();
  }

  function pointerDown(e){
    e.preventDefault();
    drawing = true;
    snapshot();
    lastPt = getPos(e);
    dctx.beginPath();
    dctx.moveTo(lastPt.x, lastPt.y);
    dctx.lineTo(lastPt.x+0.1, lastPt.y+0.1);
    strokeLine();
  }
  function pointerMove(e){
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    dctx.beginPath();
    dctx.moveTo(lastPt.x, lastPt.y);
    dctx.lineTo(p.x, p.y);
    strokeLine();
    lastPt = p;
  }
  function pointerUp(e){
    if(!drawing) return;
    drawing = false;
    hasDrawn = true;
    liveBtn.disabled = false;
  }
  function strokeLine(){
    dctx.lineCap = 'round';
    dctx.lineJoin = 'round';
    dctx.lineWidth = brushSize;
    dctx.strokeStyle = currentColor;
    dctx.stroke();
  }

  drawCanvas.addEventListener('pointerdown', pointerDown);
  drawCanvas.addEventListener('pointermove', pointerMove);
  window.addEventListener('pointerup', pointerUp);

  document.getElementById('undoBtn').addEventListener('click', ()=>{
    if(strokes.length){
      const img = strokes.pop();
      dctx.putImageData(img,0,0);
      hasDrawn = !isCanvasBlank();
      liveBtn.disabled = !hasDrawn;
    }
  });
  document.getElementById('clearDrawBtn').addEventListener('click', ()=>{
    snapshot();
    dctx.clearRect(0,0,RES,RES);
    hasDrawn = false;
    liveBtn.disabled = true;
  });

  function isCanvasBlank(){
    const d = dctx.getImageData(0,0,RES,RES).data;
    for(let i=3;i<d.length;i+=4){ if(d[i] !== 0) return false; }
    return true;
  }

  /* Extract trimmed sprite from the drawing */
  function extractSprite(){
    const data = dctx.getImageData(0,0,RES,RES);
    const px = data.data;
    let minX=RES, minY=RES, maxX=0, maxY=0, found=false;
    for(let y=0; y<RES; y++){
      for(let x=0; x<RES; x++){
        const a = px[(y*RES+x)*4+3];
        if(a > 10){
          found = true;
          if(x<minX) minX=x;
          if(x>maxX) maxX=x;
          if(y<minY) minY=y;
          if(y>maxY) maxY=y;
        }
      }
    }
    if(!found) return null;
    const pad = 6;
    minX = Math.max(0,minX-pad); minY = Math.max(0,minY-pad);
    maxX = Math.min(RES,maxX+pad); maxY = Math.min(RES,maxY+pad);
    const w = maxX-minX, h = maxY-minY;
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    off.getContext('2d').drawImage(drawCanvas, minX, minY, w, h, 0, 0, w, h);
    return off;
  }

  /* ================= SCREEN SWITCH ================= */
  const drawScreen = document.getElementById('drawScreen');
  const liveScreen = document.getElementById('liveScreen');

  function showDraw(){
    liveScreen.classList.remove('active');
    drawScreen.classList.add('active');
    dctx.clearRect(0,0,RES,RES);
    hasDrawn = false;
    strokes = [];
    liveBtn.disabled = true;
  }
  function showLive(){
    drawScreen.classList.remove('active');
    liveScreen.classList.add('active');
  }

  /* ================= CAMERA + LIVE SCENE ================= */
  const video = document.getElementById('camVideo');
  const liveCanvas = document.getElementById('liveCanvas');
  const lctx = liveCanvas.getContext('2d');
  const camMsg = document.getElementById('camMsg');
  const stage = document.getElementById('stage');
  let camStarted = false;
  let camFacing = 'environment';
  let currentStream = null;
  let creatures = [];
  let selected = null; // the creature currently controlled by the move buttons
  let burst = []; // sparkle particles for transition
  let dpr = Math.min(window.devicePixelRatio||1, 2);

  function resizeCanvas(){
    const r = stage.getBoundingClientRect();
    liveCanvas.width = r.width * dpr;
    liveCanvas.height = r.height * dpr;
    liveCanvas.style.width = r.width+'px';
    liveCanvas.style.height = r.height+'px';
  }
  window.addEventListener('resize', resizeCanvas);

  async function openCamera(facing){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:facing }, audio:false
      });
      if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
      currentStream = stream;
      video.srcObject = stream;
      video.classList.toggle('rear', facing === 'environment');
      await video.play();
      return true;
    }catch(err){
      camMsg.classList.remove('hidden');
      camMsg.textContent = "Couldn't access your camera (" + (err.message||err.name) + "). Check camera permissions and try again.";
      return false;
    }
  }

  async function startCamera(){
    if(camStarted) return true;
    const ok = await openCamera(camFacing);
    if(ok){
      camStarted = true;
      resizeCanvas();
      requestAnimationFrame(loop);
    }
    return ok;
  }

  async function flipCamera(){
    if(!camStarted) return;
    camFacing = camFacing === 'environment' ? 'user' : 'environment';
    await openCamera(camFacing);
  }

  function addCreature(sprite){
    const r = stage.getBoundingClientRect();
    const targetH = Math.min(r.height*0.28, 220);
    const scale = targetH / sprite.height;
    const w = sprite.width*scale, h = sprite.height*scale;
    creatures.push({
      img: sprite,
      w, h,
      x: Math.random()*(r.width - w) + w/2,
      y: r.height*0.55 + Math.random()*r.height*0.2,
      vx: (Math.random()<0.5?-1:1) * (30 + Math.random()*20),
      vy: 0,
      phase: Math.random()*Math.PI*2,
      bornAt: performance.now()
    });
    selected = creatures[creatures.length-1];
    spawnBurst(selected.x, selected.y);
  }

  function spawnBurst(x,y){
    for(let i=0;i<18;i++){
      const ang = Math.random()*Math.PI*2;
      const speed = 60 + Math.random()*120;
      burst.push({
        x, y,
        vx: Math.cos(ang)*speed,
        vy: Math.sin(ang)*speed,
        life: 1,
        color: [ '#FF6B57','#2BC4B8','#FFC64B','#9B7EDE'][i%4],
        size: 3 + Math.random()*4
      });
    }
  }

  let steerDir = 0;  // -1 left, 0 none, 1 right — driven by the on-screen move buttons
  let steerVert = 0; // -1 up, 0 none, 1 down

  let lastTime = performance.now();
  function loop(now){
    if(!camStarted){ return; }
    const dt = Math.min((now-lastTime)/1000, 0.05);
    lastTime = now;

    const r = stage.getBoundingClientRect();
    lctx.save();
    lctx.setTransform(dpr,0,0,dpr,0,0);
    lctx.clearRect(0,0,r.width,r.height);

    // update + draw creatures
    for(const c of creatures){
      if(c === selected){
        if(steerDir !== 0) c.vx = steerDir * 55;
        if(steerVert !== 0){
          const minY = c.h + 20, maxY = r.height - 10;
          c.y = Math.min(maxY, Math.max(minY, c.y + steerVert * 70 * dt));
        }
      }
      // step cadence speeds up with stride speed, like a real walking gait
      c.phase += (Math.abs(c.vx) * 0.11 + 0.6) * dt;
      c.x += c.vx*dt;
      if(c.x - c.w/2 < 0){ c.x = c.w/2; c.vx = Math.abs(c.vx); }
      if(c.x + c.w/2 > r.width){ c.x = r.width - c.w/2; c.vx = -Math.abs(c.vx); }

      const dir = c.vx < 0 ? -1 : 1;
      const stepBob = Math.abs(Math.sin(c.phase));      // two footfalls per cycle
      const bob = stepBob * 7;                            // small human-scale bounce
      const lean = Math.sin(c.phase*2) * 0.09 * dir;      // weight shifts side to side each step
      const squashX = 1 + stepBob*0.06;                   // slight compress/stretch on footfall
      const squashY = 1 - stepBob*0.06;

      const groundY = c.y;
      const drawY = groundY - bob;
      const shadowScale = 1 - bob/40;

      // shadow
      lctx.save();
      lctx.globalAlpha = 0.28 * shadowScale;
      lctx.fillStyle = '#000';
      lctx.beginPath();
      lctx.ellipse(c.x, groundY + c.h*0.06, (c.w*0.32)*shadowScale, c.h*0.08*shadowScale, 0, 0, Math.PI*2);
      lctx.fill();
      lctx.restore();

      // creature (footstep bounce + weight-shift lean, like a walking stride)
      lctx.save();
      lctx.translate(c.x, drawY - c.h/2);
      lctx.rotate(lean);
      lctx.scale(dir, 1);
      lctx.scale(squashX, squashY);
      lctx.drawImage(c.img, -c.w/2, -c.h/2, c.w, c.h);
      lctx.restore();

      // halo ring showing which creature the move buttons control
      if(c === selected){
        lctx.save();
        lctx.globalAlpha = 0.9;
        lctx.strokeStyle = '#2BC4B8';
        lctx.lineWidth = 3;
        lctx.setLineDash([7,5]);
        lctx.beginPath();
        lctx.ellipse(c.x, drawY - c.h/2, c.w*0.62, c.h*0.62, 0, 0, Math.PI*2);
        lctx.stroke();
        lctx.restore();
      }
    }

    // burst particles
    for(let i=burst.length-1;i>=0;i--){
      const p = burst[i];
      p.life -= dt*1.6;
      if(p.life<=0){ burst.splice(i,1); continue; }
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vy += 40*dt;
      lctx.save();
      lctx.globalAlpha = Math.max(p.life,0);
      lctx.fillStyle = p.color;
      lctx.beginPath();
      lctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      lctx.fill();
      lctx.restore();
    }

    lctx.restore();
    requestAnimationFrame(loop);
  }

  function hitTest(x,y){
    for(let i=creatures.length-1;i>=0;i--){
      const c = creatures[i];
      if(Math.abs(x-c.x) < c.w/2 && Math.abs(y-c.y) < c.h/2) return c;
    }
    return null;
  }

  liveCanvas.addEventListener('pointerdown', (e)=>{
    const r = stage.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const c = hitTest(x, y);
    if(c){
      selected = c;
      c.vx = (Math.random()<0.5?-1:1) * (60+Math.random()*60);
      c.phase += Math.PI/2;
      spawnBurst(c.x, c.y - c.h/2);
    }
  });

  [
    [document.getElementById('moveLeftBtn'), 'h', -1],
    [document.getElementById('moveRightBtn'), 'h', 1],
    [document.getElementById('moveUpBtn'), 'v', -1],
    [document.getElementById('moveDownBtn'), 'v', 1]
  ].forEach(([btn, axis, dir])=>{
    btn.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      if(axis === 'h') steerDir = dir; else steerVert = dir;
    });
    btn.addEventListener('pointerleave', ()=>{
      if(axis === 'h' && steerDir === dir) steerDir = 0;
      if(axis === 'v' && steerVert === dir) steerVert = 0;
    });
  });
  window.addEventListener('pointerup', ()=>{ steerDir = 0; steerVert = 0; });

  document.getElementById('flipCamBtn').addEventListener('click', flipCamera);

  /* ================= WIRE UP ACTIONS ================= */
  liveBtn.addEventListener('click', async ()=>{
    if(!hasDrawn) return;
    const sprite = extractSprite();
    if(!sprite) return;
    liveBtn.disabled = true;
    showLive();
    const ok = await startCamera();
    if(ok){
      camMsg.classList.add('hidden');
      resizeCanvas();
      addCreature(sprite);
    }
  });

  document.getElementById('addBtn').addEventListener('click', ()=>{
    dctx.clearRect(0,0,RES,RES);
    hasDrawn = false;
    strokes = [];
    liveBtn.disabled = true;
    drawScreen.classList.add('active');
    liveScreen.classList.remove('active');
  });

  document.getElementById('clearBtn').addEventListener('click', ()=>{
    creatures = [];
    selected = null;
    burst = [];
  });

  document.getElementById('helpBtn').addEventListener('click', ()=>{
    alert("Draw a little creature or object on the paper, then tap \"Bring it to life\". Your camera turns on and your drawing appears living in your room. Tap it to give it a boop!");
  });

  // handle canvas resizing correctly when live screen becomes visible after being hidden
  const ro = new ResizeObserver(()=>{ if(camStarted) resizeCanvas(); });
  ro.observe(stage);

})();
</script>
</body>
