<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Come Alive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2333;
    --ink-2:#262E45;
    --paper:#FBF3E4;
    --paper-line:#e8dcc4;
    --coral:#FF6B57;
    --teal:#2BC4B8;
    --gold:#FFC64B;
    --violet:#9B7EDE;
    --text-soft:#c7cce0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--ink);
    font-family:'Nunito',sans-serif;
    color:#fff;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    padding:14px 18px 10px;
    display:flex; align-items:center; justify-content:space-between;
    z-index:5;
  }
  .brand{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:20px;
    letter-spacing:0.3px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--coral);
    box-shadow:0 0 0 4px rgba(255,107,87,0.18);
  }
  .ghost-btn{
    background:transparent;
    border:1.5px solid rgba(255,255,255,0.25);
    color:#fff;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .ghost-btn:active{ background:rgba(255,255,255,0.1); }

  /* ---------- Screens ---------- */
  .screen{
    flex:1 1 auto;
    position:relative;
    display:none;
    min-height:0;
  }
  .screen.active{ display:flex; flex-direction:column; }

  /* ---------- Draw screen ---------- */
  #drawScreen{ padding:0 14px 14px; align-items:center; }
  #canvasWrap{
    position:relative;
    flex:1 1 auto;
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
  }
  #drawCanvas{
    width:100%;
    height:100%;
    max-width:520px;
    max-height:100%;
    aspect-ratio:1/1;
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size:100% 34px;
    border-radius:22px;
    box-shadow:0 14px 34px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04);
    touch-action:none;
    cursor:crosshair;
  }
  #promptTag{
    position:absolute;
    top:10px; left:50%; transform:translateX(-50%);
    background:var(--ink);
    color:var(--text-soft);
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:999px;
    white-space:nowrap;
    opacity:0.9;
    pointer-events:none;
  }

  .toolbar{
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 2px 4px;
    flex:0 0 auto;
  }
  .swatches{ display:flex; gap:8px; }
  .swatch{
    width:30px; height:30px; border-radius:50%;
    border:3px solid transparent;
    cursor:pointer;
    padding:0;
  }
  .swatch.active{ border-color:#fff; transform:scale(1.12); }
  .tool-btn{
    background:var(--ink-2);
    border:none; color:#fff;
    width:38px; height:38px; border-radius:50%;
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .tool-group{ display:flex; gap:8px; align-items:center; }
  .brush-slider{
    flex:1 1 auto;
    min-width:50px;
    max-width:120px;
    accent-color:var(--coral);
  }

  #typeRow{
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:8px 2px 0;
    flex:0 0 auto;
    font-size:13px;
    font-weight:700;
    color:var(--text-soft);
  }
  #creatureType{
    background:var(--ink-2);
    color:#fff;
    border:1.5px solid rgba(255,255,255,0.25);
    border-radius:999px;
    padding:7px 12px;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
  }

  #liveBtnWrap{ width:100%; max-width:520px; padding:6px 2px 4px; flex:0 0 auto; }
  #liveBtn{
    width:100%;
    border:none;
    border-radius:16px;
    padding:15px 0;
    background:linear-gradient(135deg, var(--coral), #ff8a3d);
    color:#1C2333;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:17px;
    letter-spacing:0.2px;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(255,107,87,0.35);
    transition:transform .1s;
  }
  #liveBtn:active{ transform:scale(0.98); }
  #liveBtn:disabled{ opacity:0.5; }

  /* ---------- Live screen ---------- */
  #liveScreen{ }
  #stage{
    position:relative;
    flex:1 1 auto;
    overflow:hidden;
    background:#000;
  }
  #camVideo{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    transform:scaleX(-1);
  }
  #camVideo.rear{ transform:none; }
  #liveCanvas{
    position:absolute; inset:0;
    width:100%; height:100%;
  }
  #camMsg{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    padding:30px;
    font-size:14px;
    color:var(--text-soft);
    background:var(--ink);
  }
  #liveFooter{
    flex:0 0 auto;
    display:flex; gap:10px;
    padding:12px 14px 16px;
    z-index:5;
  }
  #liveFooter .ghost-btn{ flex:1; text-align:center; padding:12px 0; }
  #addBtn{ background:var(--teal); border-color:var(--teal); color:#08312d; }
  #clearBtn{ }

  #hint{
    position:absolute; left:0; right:0; top:12px;
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,0.85);
    font-weight:700;
    pointer-events:none;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }

  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand"><span class="dot"></span>Come Alive</div>
    <button class="ghost-btn" id="helpBtn">?</button>
  </header>

  <!-- DRAW SCREEN -->
  <div class="screen active" id="drawScreen">
    <div id="canvasWrap">
      <div id="promptTag">draw something small &amp; simple</div>
      <canvas id="drawCanvas" width="600" height="600"></canvas>
    </div>

    <div class="toolbar">
      <div class="swatches" id="swatches"></div>
      <input type="range" id="brushSizeInput" class="brush-slider" min="3" max="30" value="10" title="Brush size">
      <div class="tool-group">
        <button class="tool-btn" id="undoBtn" title="Undo">↺</button>
        <button class="tool-btn" id="clearDrawBtn" title="Clear">✕</button>
      </div>
    </div>

    <div id="typeRow">
      <span>Movement style</span>
      <select id="creatureType" title="Movement style">
        <option value="wanderer" selected>Wanderer</option>
        <option value="cat">Cat</option>
        <option value="dog">Dog</option>
      </select>
    </div>

    <div id="liveBtnWrap">
      <button id="liveBtn" disabled>Bring it to life ✨</button>
    </div>
  </div>

  <!-- LIVE SCREEN -->
  <div class="screen" id="liveScreen">
    <div id="stage">
      <video id="camVideo" class="rear" autoplay playsinline muted></video>
      <canvas id="liveCanvas"></canvas>
      <div id="hint">drag a creature to fling it around</div>
      <div id="camMsg" class="hidden"></div>
    </div>
    <div id="liveFooter">
      <button class="tool-btn" id="flipCamBtn" title="Flip camera">⟲</button>
      <button class="ghost-btn" id="addBtn">＋ Draw another</button>
      <button class="ghost-btn" id="clearBtn">Clear all</button>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ================= DRAWING ================= */
  const drawCanvas = document.getElementById('drawCanvas');
  const dctx = drawCanvas.getContext('2d', {willReadFrequently:true});
  const RES = 600;
  drawCanvas.width = RES; drawCanvas.height = RES;

  const colors = ['#1C2333','#FF6B57','#2BC4B8','#FFC64B','#9B7EDE','#FFFFFF'];
  let currentColor = colors[0];
  let brushSize = 10;
  const swatchesEl = document.getElementById('swatches');
  colors.forEach((c,i)=>{
    const b = document.createElement('button');
    b.className = 'swatch' + (i===0?' active':'');
    b.style.background = c;
    if(c === '#FFFFFF') b.style.boxShadow = 'inset 0 0 0 1px rgba(0,0,0,0.2)';
    b.addEventListener('click', ()=>{
      currentColor = c;
      [...swatchesEl.children].forEach(ch=>ch.classList.remove('active'));
      b.classList.add('active');
    });
    swatchesEl.appendChild(b);
  });

  const brushSizeInput = document.getElementById('brushSizeInput');
  brushSizeInput.addEventListener('input', ()=>{ brushSize = Number(brushSizeInput.value); });

  let creatureType = 'wanderer';
  const creatureTypeSelect = document.getElementById('creatureType');
  creatureTypeSelect.addEventListener('change', ()=>{ creatureType = creatureTypeSelect.value; });

  let drawing = false;
  let lastPt = null;
  let strokes = []; // for undo: array of {img data snapshots} -- store as canvas snapshots
  let hasDrawn = false;
  const liveBtn = document.getElementById('liveBtn');

  function getPos(e){
    const rect = drawCanvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
    return {
      x: (cx - rect.left) / rect.width * RES,
      y: (cy - rect.top) / rect.height * RES
    };
  }

  function snapshot(){
    strokes.push(dctx.getImageData(0,0,RES,RES));
    if(strokes.length > 20) strokes.shift();
  }

  function pointerDown(e){
    e.preventDefault();
    drawing = true;
    snapshot();
    lastPt = getPos(e);
    dctx.beginPath();
    dctx.moveTo(lastPt.x, lastPt.y);
    dctx.lineTo(lastPt.x+0.1, lastPt.y+0.1);
    strokeLine();
  }
  function pointerMove(e){
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    dctx.beginPath();
    dctx.moveTo(lastPt.x, lastPt.y);
    dctx.lineTo(p.x, p.y);
    strokeLine();
    lastPt = p;
  }
  function pointerUp(e){
    if(!drawing) return;
    drawing = false;
    hasDrawn = true;
    liveBtn.disabled = false;
  }
  function strokeLine(){
    dctx.lineCap = 'round';
    dctx.lineJoin = 'round';
    dctx.lineWidth = brushSize;
    dctx.strokeStyle = currentColor;
    dctx.stroke();
  }

  drawCanvas.addEventListener('pointerdown', pointerDown);
  drawCanvas.addEventListener('pointermove', pointerMove);
  window.addEventListener('pointerup', pointerUp);

  document.getElementById('undoBtn').addEventListener('click', ()=>{
    if(strokes.length){
      const img = strokes.pop();
      dctx.putImageData(img,0,0);
      hasDrawn = !isCanvasBlank();
      liveBtn.disabled = !hasDrawn;
    }
  });
  document.getElementById('clearDrawBtn').addEventListener('click', ()=>{
    snapshot();
    dctx.clearRect(0,0,RES,RES);
    hasDrawn = false;
    liveBtn.disabled = true;
  });

  function isCanvasBlank(){
    const d = dctx.getImageData(0,0,RES,RES).data;
    for(let i=3;i<d.length;i+=4){ if(d[i] !== 0) return false; }
    return true;
  }

  /* Extract trimmed sprite from the drawing */
  function extractSprite(){
    const data = dctx.getImageData(0,0,RES,RES);
    const px = data.data;
    let minX=RES, minY=RES, maxX=0, maxY=0, found=false;
    for(let y=0; y<RES; y++){
      for(let x=0; x<RES; x++){
        const a = px[(y*RES+x)*4+3];
        if(a > 10){
          found = true;
          if(x<minX) minX=x;
          if(x>maxX) maxX=x;
          if(y<minY) minY=y;
          if(y>maxY) maxY=y;
        }
      }
    }
    if(!found) return null;
    const pad = 6;
    minX = Math.max(0,minX-pad); minY = Math.max(0,minY-pad);
    maxX = Math.min(RES,maxX+pad); maxY = Math.min(RES,maxY+pad);
    const w = maxX-minX, h = maxY-minY;
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    off.getContext('2d').drawImage(drawCanvas, minX, minY, w, h, 0, 0, w, h);
    return off;
  }

  /* ================= SCREEN SWITCH ================= */
  const drawScreen = document.getElementById('drawScreen');
  const liveScreen = document.getElementById('liveScreen');

  function showDraw(){
    liveScreen.classList.remove('active');
    drawScreen.classList.add('active');
    dctx.clearRect(0,0,RES,RES);
    hasDrawn = false;
    strokes = [];
    liveBtn.disabled = true;
  }
  function showLive(){
    drawScreen.classList.remove('active');
    liveScreen.classList.add('active');
  }

  /* ================= CAMERA + LIVE SCENE ================= */
  const video = document.getElementById('camVideo');
  const liveCanvas = document.getElementById('liveCanvas');
  const lctx = liveCanvas.getContext('2d');
  const camMsg = document.getElementById('camMsg');
  const stage = document.getElementById('stage');
  let camStarted = false;
  let camFacing = 'environment';
  let currentStream = null;
  let creatures = [];
  let dragging = null; // { c, x, y, t, vx } while a creature is being dragged
  let burst = []; // sparkle particles for transition
  let dpr = Math.min(window.devicePixelRatio||1, 2);

  function resizeCanvas(){
    const r = stage.getBoundingClientRect();
    liveCanvas.width = r.width * dpr;
    liveCanvas.height = r.height * dpr;
    liveCanvas.style.width = r.width+'px';
    liveCanvas.style.height = r.height+'px';
  }
  window.addEventListener('resize', resizeCanvas);

  async function openCamera(facing){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:facing }, audio:false
      });
      if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
      currentStream = stream;
      video.srcObject = stream;
      video.classList.toggle('rear', facing === 'environment');
      await video.play();
      return true;
    }catch(err){
      camMsg.classList.remove('hidden');
      camMsg.textContent = "Couldn't access your camera (" + (err.message||err.name) + "). Check camera permissions and try again.";
      return false;
    }
  }

  async function startCamera(){
    if(camStarted) return true;
    const ok = await openCamera(camFacing);
    if(ok){
      camStarted = true;
      resizeCanvas();
      requestAnimationFrame(loop);
    }
    return ok;
  }

  async function flipCamera(){
    if(!camStarted) return;
    camFacing = camFacing === 'environment' ? 'user' : 'environment';
    await openCamera(camFacing);
  }

  /* ---- ground mapping: fake depth by treating the lower part of the
     camera frame as a "floor" creatures walk on, shrinking with distance
     and picking up the real floor's color for their contact shadow ---- */
  function floorBounds(r){
    return { top: r.height*0.42, bottom: r.height*0.95 };
  }
  function perspectiveScale(y, r){
    const { top, bottom } = floorBounds(r);
    const t = Math.min(1, Math.max(0, (y-top)/(bottom-top)));
    return 0.6 + 0.55*t; // smaller near the horizon, bigger up close
  }

  const sampleCanvas = document.createElement('canvas');
  sampleCanvas.width = 6; sampleCanvas.height = 6;
  const sctx = sampleCanvas.getContext('2d', {willReadFrequently:true});

  function sampleGroundColor(x, y, r){
    if(!video.videoWidth) return null;
    const scale = Math.max(r.width/video.videoWidth, r.height/video.videoHeight);
    const drawnW = video.videoWidth*scale, drawnH = video.videoHeight*scale;
    const offsetX = (r.width-drawnW)/2, offsetY = (r.height-drawnH)/2;
    let vx = (x-offsetX)/scale, vy = (y-offsetY)/scale;
    if(!video.classList.contains('rear')) vx = video.videoWidth - vx; // mirrored display
    try{
      sctx.drawImage(video, vx-3, vy-3, 6, 6, 0, 0, 6, 6);
      const d = sctx.getImageData(0,0,6,6).data;
      let rs=0, gs=0, bs=0, n=0;
      for(let i=0;i<d.length;i+=4){ rs+=d[i]; gs+=d[i+1]; bs+=d[i+2]; n++; }
      return [rs/n, gs/n, bs/n];
    }catch(e){
      return null; // e.g. video frame not decodable yet
    }
  }

  /* ---- synthesized sound effects (no audio files, generated with Web Audio) ---- */
  let audioCtx = null;
  function getAudioCtx(){
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playBark(){
    const ctx = getAudioCtx();
    const t0 = ctx.currentTime;
    for(let i=0;i<2;i++){
      const start = t0 + i*0.16;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(340, start);
      osc.frequency.exponentialRampToValueAtTime(150, start+0.1);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.55, start+0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, start+0.14);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start+0.16);
    }
  }
  function playPurr(duration){
    duration = duration || 0.9;
    const ctx = getAudioCtx();
    const t0 = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, t0);
    master.gain.exponentialRampToValueAtTime(0.22, t0+0.1);
    master.gain.setValueAtTime(0.22, t0+Math.max(duration-0.2, 0.1));
    master.gain.exponentialRampToValueAtTime(0.0001, t0+duration);
    master.connect(ctx.destination);
    [44, 47].forEach(freq=>{
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.connect(master);
      osc.start(t0);
      osc.stop(t0+duration);
    });
  }

  function addCreature(sprite){
    const r = stage.getBoundingClientRect();
    const targetH = Math.min(r.height*0.28, 220);
    const scale = targetH / sprite.height;
    const w = sprite.width*scale, h = sprite.height*scale;
    const { top, bottom } = floorBounds(r);
    const type = creatureType;
    const baseVx = type === 'dog' ? (70 + Math.random()*40)
      : type === 'cat' ? (12 + Math.random()*8)
      : (30 + Math.random()*20);
    creatures.push({
      id: creatures.length,
      type,
      img: sprite,
      w, h,
      x: Math.random()*(r.width - w) + w/2,
      y: top + Math.random()*(bottom-top),
      vx: (Math.random()<0.5?-1:1) * baseVx,
      vy: 0,
      phase: Math.random()*Math.PI*2,
      renderScale: 1,
      groundColor: null,
      state: type === 'dog' ? 'running' : type === 'cat' ? 'walking' : 'move',
      behaviorT: type === 'dog' ? (1.2 + Math.random()*1.6) : type === 'cat' ? (2 + Math.random()*2.5) : 0,
      jumpT: 0,
      bornAt: performance.now()
    });
    const c = creatures[creatures.length-1];
    spawnBurst(c.x, c.y);
  }

  function spawnBurst(x,y){
    for(let i=0;i<18;i++){
      const ang = Math.random()*Math.PI*2;
      const speed = 60 + Math.random()*120;
      burst.push({
        x, y,
        vx: Math.cos(ang)*speed,
        vy: Math.sin(ang)*speed,
        life: 1,
        color: [ '#FF6B57','#2BC4B8','#FFC64B','#9B7EDE'][i%4],
        size: 3 + Math.random()*4
      });
    }
  }

  /* ---- per-species movement AI ---- */
  function wallBounce(c, r){
    if(c.x - c.w/2 < 0){ c.x = c.w/2; c.vx = Math.abs(c.vx); }
    if(c.x + c.w/2 > r.width){ c.x = r.width - c.w/2; c.vx = -Math.abs(c.vx); }
  }
  function updateWanderer(c, dt, r){
    c.x += c.vx*dt;
    wallBounce(c, r);
    return 0;
  }
  function updateDog(c, dt, r){
    c.behaviorT -= dt;
    if(c.state === 'running'){
      c.x += c.vx*dt;
      wallBounce(c, r);
      if(c.behaviorT <= 0){
        c.state = 'barking';
        c.behaviorT = 0.5 + Math.random()*0.4;
        c.pausedVx = c.vx;
        c.vx = 0;
        playBark();
      }
    } else if(c.behaviorT <= 0){
      c.state = 'running';
      c.behaviorT = 1.4 + Math.random()*1.6;
      const speed = 70 + Math.random()*40;
      c.vx = -Math.sign(c.pausedVx || 1) * speed; // reverse each time — runs back and forth
    }
    return 0;
  }
  function updateCat(c, dt, r){
    c.behaviorT -= dt;
    if(c.state === 'jumping'){
      c.jumpT += dt/0.5;
      c.x += c.vx*0.5*dt; // creep forward mid-pounce
      wallBounce(c, r);
      if(c.jumpT >= 1){
        c.jumpT = 0;
        c.state = 'walking';
        c.behaviorT = 2 + Math.random()*2.5;
      }
      return Math.sin(Math.min(c.jumpT,1)*Math.PI) * 46; // jump arc height in px
    }
    c.x += c.vx*dt;
    wallBounce(c, r);
    if(c.behaviorT <= 0){
      c.state = 'jumping';
      c.jumpT = 0;
    }
    return 0;
  }
  function updateBehavior(c, dt, r){
    if(c.type === 'dog') return updateDog(c, dt, r);
    if(c.type === 'cat') return updateCat(c, dt, r);
    return updateWanderer(c, dt, r);
  }

  let lastTime = performance.now();
  let frameCount = 0;
  function loop(now){
    if(!camStarted){ return; }
    const dt = Math.min((now-lastTime)/1000, 0.05);
    lastTime = now;
    frameCount++;

    const r = stage.getBoundingClientRect();
    lctx.save();
    lctx.setTransform(dpr,0,0,dpr,0,0);
    lctx.clearRect(0,0,r.width,r.height);

    // update + draw creatures
    for(const c of creatures){
      const isDragging = dragging && dragging.c === c;
      const jumpOffset = isDragging ? 0 : updateBehavior(c, dt, r);
      // step cadence speeds up with stride speed, like a real walking gait
      c.phase += (Math.abs(c.vx) * 0.11 + 0.6) * dt;

      const dir = c.vx < 0 ? -1 : 1;
      const stepBob = Math.abs(Math.sin(c.phase));      // two footfalls per cycle
      const bob = stepBob * 7;                            // small human-scale bounce
      const lean = Math.sin(c.phase*2) * 0.09 * dir;      // weight shifts side to side each step
      const jumpT = jumpOffset / 46;                       // 0..1 while a cat is airborne
      const squashX = 1 + stepBob*0.06 + jumpT*0.12;      // slight compress/stretch on footfall or leap
      const squashY = 1 - stepBob*0.06 - jumpT*0.18;

      // depth: shrink/grow with distance from the "horizon" and pick up
      // the real floor's color under the creature's feet every few frames
      c.renderScale = perspectiveScale(c.y, r);
      if((frameCount + c.id) % 9 === 0){
        const sampled = sampleGroundColor(c.x, c.y, r);
        if(sampled) c.groundColor = sampled;
      }

      const w = c.w * c.renderScale, h = c.h * c.renderScale;
      const groundY = c.y;
      const drawY = groundY - bob*c.renderScale - jumpOffset;
      const shadowScale = Math.max(0.15, 1 - bob/40 - jumpT*0.5);

      // shadow — tinted with the sampled floor color so it blends into the real surface
      lctx.save();
      lctx.globalAlpha = 0.32 * shadowScale;
      lctx.fillStyle = c.groundColor
        ? `rgb(${Math.round(c.groundColor[0]*0.3)}, ${Math.round(c.groundColor[1]*0.3)}, ${Math.round(c.groundColor[2]*0.3)})`
        : '#000';
      lctx.beginPath();
      lctx.ellipse(c.x, groundY + h*0.06, (w*0.32)*shadowScale, h*0.08*shadowScale, 0, 0, Math.PI*2);
      lctx.fill();
      lctx.restore();

      // creature (footstep bounce + weight-shift lean, like a walking stride)
      lctx.save();
      lctx.translate(c.x, drawY - h/2);
      lctx.rotate(lean);
      lctx.scale(dir, 1);
      lctx.scale(squashX, squashY);
      lctx.drawImage(c.img, -w/2, -h/2, w, h);
      lctx.restore();

      // halo ring showing which creature is being dragged right now
      if(isDragging){
        lctx.save();
        lctx.globalAlpha = 0.9;
        lctx.strokeStyle = '#2BC4B8';
        lctx.lineWidth = 3;
        lctx.setLineDash([7,5]);
        lctx.beginPath();
        lctx.ellipse(c.x, drawY - h/2, w*0.62, h*0.62, 0, 0, Math.PI*2);
        lctx.stroke();
        lctx.restore();
      }
    }

    // burst particles
    for(let i=burst.length-1;i>=0;i--){
      const p = burst[i];
      p.life -= dt*1.6;
      if(p.life<=0){ burst.splice(i,1); continue; }
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vy += 40*dt;
      lctx.save();
      lctx.globalAlpha = Math.max(p.life,0);
      lctx.fillStyle = p.color;
      lctx.beginPath();
      lctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      lctx.fill();
      lctx.restore();
    }

    lctx.restore();
    requestAnimationFrame(loop);
  }

  function hitTest(x,y){
    for(let i=creatures.length-1;i>=0;i--){
      const c = creatures[i];
      const scale = c.renderScale || 1;
      if(Math.abs(x-c.x) < (c.w*scale)/2 && Math.abs(y-c.y) < (c.h*scale)/2) return c;
    }
    return null;
  }

  liveCanvas.addEventListener('pointerdown', (e)=>{
    const r = stage.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const c = hitTest(x, y);
    if(c){
      liveCanvas.setPointerCapture(e.pointerId);
      dragging = { c, x, y, t: performance.now(), vx: 0, purrTimer: null };
      c.phase += Math.PI/2;
      spawnBurst(c.x, c.y - c.h/2);
      if(c.type === 'dog'){
        playBark();
      }else if(c.type === 'cat'){
        playPurr(1.1);
        dragging.purrTimer = setInterval(()=>playPurr(1.1), 1000);
      }
    }
  });

  liveCanvas.addEventListener('pointermove', (e)=>{
    if(!dragging) return;
    const r = stage.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const now = performance.now();
    const dt = Math.max((now - dragging.t)/1000, 0.001);
    const c = dragging.c;
    dragging.vx = (x - dragging.x) / dt;
    const { top, bottom } = floorBounds(r);
    c.x = Math.min(r.width - c.w/2, Math.max(c.w/2, x));
    c.y = Math.min(bottom, Math.max(top, y));
    dragging.x = x; dragging.y = y; dragging.t = now;
  });

  function endDrag(){
    if(!dragging) return;
    if(dragging.purrTimer) clearInterval(dragging.purrTimer);
    if(Math.abs(dragging.vx) > 20){
      dragging.c.vx = Math.max(-320, Math.min(320, dragging.vx));
    }
    dragging = null;
  }
  liveCanvas.addEventListener('pointerup', endDrag);
  liveCanvas.addEventListener('pointercancel', endDrag);

  document.getElementById('flipCamBtn').addEventListener('click', flipCamera);

  /* ================= WIRE UP ACTIONS ================= */
  liveBtn.addEventListener('click', async ()=>{
    if(!hasDrawn) return;
    const sprite = extractSprite();
    if(!sprite) return;
    liveBtn.disabled = true;
    getAudioCtx(); // unlock audio now, on a user gesture, so later autonomous barks aren't blocked
    showLive();
    const ok = await startCamera();
    if(ok){
      camMsg.classList.add('hidden');
      resizeCanvas();
      addCreature(sprite);
    }
  });

  document.getElementById('addBtn').addEventListener('click', ()=>{
    dctx.clearRect(0,0,RES,RES);
    hasDrawn = false;
    strokes = [];
    liveBtn.disabled = true;
    drawScreen.classList.add('active');
    liveScreen.classList.remove('active');
  });

  document.getElementById('clearBtn').addEventListener('click', ()=>{
    creatures = [];
    dragging = null;
    burst = [];
  });

  document.getElementById('helpBtn').addEventListener('click', ()=>{
    alert("Draw a little creature, pick a movement style (Wanderer, Cat, or Dog), then tap \"Bring it to life\". Your camera turns on and your drawing appears living in your room. Drag it to fling it around!");
  });

  // handle canvas resizing correctly when live screen becomes visible after being hidden
  const ro = new ResizeObserver(()=>{ if(camStarted) resizeCanvas(); });
  ro.observe(stage);

})();
</script>
</body>
</html>
