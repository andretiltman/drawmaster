<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Drawmaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2333;
    --ink-2:#262E45;
    --paper:#FBF3E4;
    --paper-line:#e8dcc4;
    --coral:#FF6B57;
    --teal:#2BC4B8;
    --gold:#FFC64B;
    --violet:#9B7EDE;
    --text-soft:#c7cce0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--ink);
    font-family:'Nunito',sans-serif;
    color:#fff;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    padding:14px 18px 10px;
    display:flex; align-items:center; justify-content:space-between;
    z-index:5;
  }
  .brand{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:20px;
    letter-spacing:0.3px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--coral);
    box-shadow:0 0 0 4px rgba(255,107,87,0.18);
  }
  .ghost-btn{
    background:transparent;
    border:1.5px solid rgba(255,255,255,0.25);
    color:#fff;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .ghost-btn:active{ background:rgba(255,255,255,0.1); }

  /* ---------- Screens ---------- */
  .screen{
    flex:1 1 auto;
    position:relative;
    display:none;
    min-height:0;
  }
  .screen.active{ display:flex; flex-direction:column; }

  /* ---------- Draw screens (creature + background) ---------- */
  #drawScreen, #bgScreen{ padding:0 14px 14px; align-items:center; }
  .canvasWrap{
    position:relative;
    flex:1 1 auto;
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
  }
  .padCanvas{
    width:100%;
    height:100%;
    max-width:520px;
    max-height:100%;
    aspect-ratio:1/1;
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size:100% 34px;
    border-radius:22px;
    box-shadow:0 14px 34px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04);
    touch-action:none;
    cursor:crosshair;
  }
  #bgCanvas{ aspect-ratio:3/4; }
  .promptTag{
    position:absolute;
    top:10px; left:50%; transform:translateX(-50%);
    background:var(--ink);
    color:var(--text-soft);
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:999px;
    white-space:nowrap;
    opacity:0.9;
    pointer-events:none;
  }

  .toolbar{
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 2px 4px;
    flex:0 0 auto;
  }
  .swatches{ display:flex; gap:8px; }
  .swatch{
    width:30px; height:30px; border-radius:50%;
    border:3px solid transparent;
    cursor:pointer;
    padding:0;
  }
  .swatch.active{ border-color:#fff; transform:scale(1.12); }
  .tool-btn{
    background:var(--ink-2);
    border:none; color:#fff;
    width:38px; height:38px; border-radius:50%;
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .tool-group{ display:flex; gap:8px; align-items:center; }
  .brush-slider{
    flex:1 1 auto;
    min-width:50px;
    max-width:120px;
    accent-color:var(--coral);
  }

  .optionRow{
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:8px 2px 0;
    flex:0 0 auto;
    font-size:13px;
    font-weight:700;
    color:var(--text-soft);
  }
  .pillSelect{
    background:var(--ink-2);
    color:#fff;
    border:1.5px solid rgba(255,255,255,0.25);
    border-radius:999px;
    padding:7px 12px;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
  }
  .pillSelect:disabled{ opacity:0.5; cursor:default; }

  #liveBtnWrap{ width:100%; max-width:520px; padding:6px 2px 4px; flex:0 0 auto; }
  #liveBtn{
    width:100%;
    border:none;
    border-radius:16px;
    padding:15px 0;
    background:linear-gradient(135deg, var(--coral), #ff8a3d);
    color:#1C2333;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:17px;
    letter-spacing:0.2px;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(255,107,87,0.35);
    transition:transform .1s;
  }
  #liveBtn:active{ transform:scale(0.98); }
  #liveBtn:disabled{ opacity:0.5; }

  /* ---------- Live screen ---------- */
  #liveScreen{ }
  #stage{
    position:relative;
    flex:1 1 auto;
    overflow:hidden;
    background:#000;
  }
  #camVideo{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    transform:scaleX(-1);
  }
  #camVideo.rear{ transform:none; }
  #bgImage{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
  }
  #liveCanvas{
    position:absolute; inset:0;
    width:100%; height:100%;
  }
  #camMsg{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    padding:30px;
    font-size:14px;
    color:var(--text-soft);
    background:var(--ink);
  }
  #liveFooter{
    flex:0 0 auto;
    display:flex; gap:10px;
    padding:12px 14px 16px;
    z-index:5;
  }
  #liveFooter .ghost-btn{ flex:1; text-align:center; padding:12px 0; }
  #addBtn{ background:var(--teal); border-color:var(--teal); color:#08312d; }
  #clearBtn{ }

  #hint{
    position:absolute; left:0; right:0; top:12px;
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,0.85);
    font-weight:700;
    pointer-events:none;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }

  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand"><span class="dot"></span>Drawmaster</div>
    <button class="ghost-btn" id="helpBtn">?</button>
  </header>

  <!-- DRAW SCREEN -->
  <div class="screen active" id="drawScreen">
    <div class="canvasWrap">
      <div class="promptTag">draw something small &amp; simple</div>
      <canvas id="drawCanvas" class="padCanvas" width="600" height="600"></canvas>
    </div>

    <div class="toolbar">
      <div class="swatches" id="swatches"></div>
      <input type="range" id="brushSizeInput" class="brush-slider" min="3" max="30" value="10" title="Brush size">
      <div class="tool-group">
        <button class="tool-btn" id="undoBtn" title="Undo">↺</button>
        <button class="tool-btn" id="clearDrawBtn" title="Clear">✕</button>
      </div>
    </div>

    <div class="optionRow">
      <span>Movement style</span>
      <select id="creatureType" class="pillSelect" title="Movement style">
        <option value="wanderer" selected>Wanderer</option>
        <option value="cat">Cat</option>
        <option value="dog">Dog</option>
        <option value="bird">Bird</option>
        <option value="bunny">Bunny</option>
        <option value="snail">Snail</option>
        <option value="polarBear">Polar Bear</option>
      </select>
    </div>

    <div class="optionRow">
      <span>Background</span>
      <select id="backdropMode" class="pillSelect" title="Background">
        <option value="camera" selected>Camera</option>
        <option value="drawn">Draw it</option>
      </select>
    </div>

    <div id="liveBtnWrap">
      <button id="liveBtn" disabled>Bring it to life ✨</button>
    </div>
  </div>

  <!-- BACKGROUND DRAW SCREEN (only used when "Draw it" is picked above) -->
  <div class="screen" id="bgScreen">
    <div class="canvasWrap">
      <div class="promptTag">draw the room or scene behind your creature</div>
      <canvas id="bgCanvas" class="padCanvas" width="480" height="800"></canvas>
    </div>

    <div class="toolbar">
      <div class="swatches" id="bgSwatches"></div>
      <input type="range" id="bgBrushSizeInput" class="brush-slider" min="3" max="40" value="16" title="Brush size">
      <div class="tool-group">
        <button class="tool-btn" id="bgUndoBtn" title="Undo">↺</button>
        <button class="tool-btn" id="bgClearBtn" title="Clear">✕</button>
      </div>
    </div>

    <div id="liveBtnWrap">
      <button id="setBgBtn">Set background ✨</button>
    </div>
  </div>

  <!-- LIVE SCREEN -->
  <div class="screen" id="liveScreen">
    <div id="stage">
      <video id="camVideo" class="rear" autoplay playsinline muted></video>
      <img id="bgImage" class="hidden" alt="">
      <canvas id="liveCanvas"></canvas>
      <div id="hint">drag a creature to fling it around</div>
      <div id="camMsg" class="hidden"></div>
    </div>
    <div id="liveFooter">
      <button class="tool-btn" id="flipCamBtn" title="Flip camera">⟲</button>
      <button class="ghost-btn" id="addBtn">＋ Draw another</button>
      <button class="ghost-btn" id="clearBtn">Clear all</button>
    </div>
  </div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
